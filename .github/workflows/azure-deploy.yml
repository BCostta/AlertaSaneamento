name: Deploy para Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore AlertaSaneamento/AlertaSaneamento.csproj
        working-directory: AlertaSaneamento

      - name: Build
        run: dotnet build AlertaSaneamento/AlertaSaneamento.csproj --configuration Release --no-restore
        working-directory: AlertaSaneamento

      - name: Publicar
        run: dotnet publish AlertaSaneamento/AlertaSaneamento.csproj --configuration Release --output ./publish
        working-directory: AlertaSaneamento

      - name: Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: AlertaSaneamento/publish
